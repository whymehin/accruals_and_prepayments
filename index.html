<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Accounting Adventure · 應計與預付大冒險</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4ecdc4;
            --secondary: #ffe66d;
            --accent: #ff6b6b;
            --dark: #292f36;
            --light: #f7fff7;
            --border-radius: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: linear-gradient(135deg, #005c97 0%, #363795 100%);
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            color: var(--dark);
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding: 10px 0;
        }

        h1 { font-size: 1.5rem; color: var(--secondary); text-shadow: 2px 2px 0 var(--accent); }

        /* Tabs Navigation */
        .nav-tabs {
            display: flex;
            width: 100%;
            max-width: 500px;
            gap: 5px;
            margin: 15px 0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 5px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--secondary);
            color: var(--dark);
            box-shadow: 0 4px 0 #d4bc3d;
        }

        /* Main Container */
        .main-stage {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
            background: #f0f0f0;
            padding: 10px;
            border-radius: 12px;
        }

        /* Classification Card Style */
        .question-card {
            background: #e3f2fd;
            padding: 25px 15px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 20px;
            border-left: 8px solid var(--primary);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .choice-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Buttons */
        .btn-game {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-accrual { background: #ff6b6b; color: white; }
        .btn-prepayment { background: #4ecdc4; color: white; }
        .btn-check { background: var(--dark); color: white; width: 100%; margin-top: 10px; }
        .btn-next { background: var(--secondary); color: var(--dark); width: 100%; margin-top: 10px; }

        .btn-game:active { transform: scale(0.95); }
        .btn-game:disabled { background: #ccc; color: #888; transform: none; cursor: not-allowed; }

        /* Input Styles */
        .big-input {
            width: 100%;
            padding: 15px;
            font-size: 1.4rem;
            text-align: center;
            border: 3px solid #ddd;
            border-radius: 12px;
            margin-bottom: 10px;
            -moz-appearance: textfield;
        }

        /* Match-up specific */
        .match-option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .match-opt { 
            padding: 10px; border: 2px solid #ddd; border-radius: 10px; background: white; 
            font-size: 0.8rem; font-weight: bold;
        }
        .match-opt.selected { background: var(--secondary); border-color: #d4bc3d; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <h1 id="title">💰 Accounting Adventure</h1>
    <button onclick="toggleLang()" style="margin-top:5px; background:none; border:1px solid white; color:white; padding:2px 10px; border-radius:10px; font-size:0.7rem;">Language / 語言</button>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('tab1')" id="nav1">分類</button>
    <button class="tab-btn" onclick="switchTab('tab2')" id="nav2">計算</button>
    <button class="tab-btn" onclick="switchTab('tab3')" id="nav3">配對</button>
</div>

<div class="main-stage">
    <div class="status-bar">
        <span id="score-label">🏆 分數: 0</span>
        <span id="feedback" style="font-size: 0.8rem; color: #555;">加油！</span>
    </div>

    <div id="tab1" class="game-content">
        <div class="question-card" id="class-text">Loading...</div>
        <div class="choice-row" id="class-buttons">
            <button class="btn-game btn-accrual" id="btn-acc" onclick="checkClass('accrual')">應計 (Accrual)</button>
            <button class="btn-game btn-prepayment" id="btn-pre" onclick="checkClass('prepayment')">預付 (Prepayment)</button>
        </div>
        <button class="btn-game btn-next hidden" id="next-class" onclick="nextClass()">下一題 ⏩</button>
    </div>

    <div id="tab2" class="game-content hidden">
        <div class="question-card" id="calc-text" style="background:#fff9c4; border-color:#fbc02d;">Loading...</div>
        <input type="number" id="calc-input" class="big-input" placeholder="$ Amount" inputmode="decimal">
        <button class="btn-game btn-check" id="check-calc" onclick="checkCalc()">檢查答案</button>
        <button class="btn-game btn-next hidden" id="next-calc" onclick="nextCalc()">下一題 ⏩</button>
    </div>

    <div id="tab3" class="game-content hidden">
        <div class="question-card" id="match-text" style="background:#f1f8e9; border-color:#8bc34a; font-size: 0.95rem;">Loading...</div>
        
        <div class="match-option-grid">
            <button class="match-opt" id="m-inc" onclick="setMatch('dir','inc')">➕ 增加費用</button>
            <button class="match-opt" id="m-dec" onclick="setMatch('dir','dec')">➖ 減少費用</button>
            <button class="match-opt" id="m-asset" onclick="setMatch('bs','asset')">🟢 流動資產</button>
            <button class="match-opt" id="m-liab" onclick="setMatch('bs','liab')">🔴 流動負債</button>
        </div>

        <input type="number" id="match-input" class="big-input" placeholder="$ Amount" inputmode="decimal">
        <button class="btn-game btn-check" id="check-match" onclick="checkMatch()">確認提交</button>
        <button class="btn-game btn-next hidden" id="next-match" onclick="nextMatch()">下一題 ⏩</button>
    </div>
</div>

<script>
    const i18n = {
        zh: {
            score: "🏆 分數: ",
            correct: "✅ 答對了！",
            wrong: "❌ 不太對，再試試！",
            classCards: [
                {q: "期末收到電費單 $500，尚未付款", a: "accrual"},
                {q: "提前支付明年的保險費 $1,200", a: "prepayment"},
                {q: "本月薪金 $2,000 將在下月發放", a: "accrual"},
                {q: "本年支付了15個月的租金", a: "prepayment"}
            ],
            calcQs: [
                {q: "已付租金 $10,000，其中 $1,000 屬於明年。本年費用是多少？", a: 9000},
                {q: "已付水費 $400，期末欠交 $150。本年總費用是多少？", a: 550}
            ],
            matchQs: [
                {q: "期末欠交員工佣金 $800。", dir: "inc", bs: "liab", amt: 800},
                {q: "已付廣告費中 $300 屬於下一年度。", dir: "dec", bs: "asset", amt: 300}
            ]
        },
        en: {
            score: "🏆 Score: ",
            correct: "✅ Correct!",
            wrong: "❌ Wrong, try again!",
            classCards: [
                {q: "Utility bill $500 received but unpaid.", a: "accrual"},
                {q: "Paid $1,200 for next year's insurance.", a: "prepayment"},
                {q: "Dec wages $2,000 to be paid in Jan.", a: "accrual"},
                {q: "Paid 15 months of rent this year.", a: "prepayment"}
            ],
            calcQs: [
                {q: "Rent paid $10,000 (includes $1,000 for next year). Expense?", a: 9000},
                {q: "Water paid $400. Accrued $150. Total expense?", a: 550}
            ],
            matchQs: [
                {q: "Unpaid sales commission $800.", dir: "inc", bs: "liab", amt: 800},
                {q: "Advertising includes $300 prepaid.", dir: "dec", bs: "asset", amt: 300}
            ]
        }
    };

    let lang = 'zh';
    let score = 0;
    let idx1 = 0, idx2 = 0, idx3 = 0;
    let matchSel = {dir: null, bs: null};

    function switchTab(id) {
        document.querySelectorAll('.game-content').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        event.target.classList.add('active');
    }

    function toggleLang() {
        lang = lang === 'zh' ? 'en' : 'zh';
        render();
    }

    // --- GAME 1: CLASSIFICATION ---
    function renderClass() {
        const q = i18n[lang].classCards[idx1];
        document.getElementById('class-text').innerText = q.q;
        document.getElementById('btn-acc').disabled = false;
        document.getElementById('btn-pre').disabled = false;
        document.getElementById('next-class').classList.add('hidden');
    }

    function checkClass(choice) {
        const correct = i18n[lang].classCards[idx1].a;
        if(choice === correct) {
            updateScore(10);
            document.getElementById('feedback').innerText = i18n[lang].correct;
            document.getElementById('btn-acc').disabled = true;
            document.getElementById('btn-pre').disabled = true;
            document.getElementById('next-class').classList.remove('hidden');
        } else {
            document.getElementById('feedback').innerText = i18n[lang].wrong;
        }
    }

    function nextClass() {
        idx1 = (idx1 + 1) % i18n[lang].classCards.length;
        renderClass();
    }

    // --- GAME 2: CALCULATION ---
    function renderCalc() {
        document.getElementById('calc-text').innerText = i18n[lang].calcQs[idx2].q;
        document.getElementById('calc-input').value = '';
        document.getElementById('check-calc').disabled = false;
        document.getElementById('next-calc').classList.add('hidden');
    }

    function checkCalc() {
        const val = parseFloat(document.getElementById('calc-input').value);
        if(val === i18n[lang].calcQs[idx2].a) {
            updateScore(20);
            document.getElementById('feedback').innerText = i18n[lang].correct;
            document.getElementById('check-calc').disabled = true;
            document.getElementById('next-calc').classList.remove('hidden');
        } else {
            document.getElementById('feedback').innerText = i18n[lang].wrong;
        }
    }

    function nextCalc() {
        idx2 = (idx2 + 1) % i18n[lang].calcQs.length;
        renderCalc();
    }

    // --- GAME 3: MATCH-UP ---
    function renderMatch() {
        document.getElementById('match-text').innerText = i18n[lang].matchQs[idx3].q;
        document.getElementById('match-input').value = '';
        matchSel = {dir: null, bs: null};
        document.querySelectorAll('.match-opt').forEach(el => el.classList.remove('selected'));
        document.getElementById('check-match').disabled = false;
        document.getElementById('next-match').classList.add('hidden');
    }

    function setMatch(type, val) {
        matchSel[type] = val;
        if(type === 'dir') {
            document.getElementById('m-inc').classList.toggle('selected', val==='inc');
            document.getElementById('m-dec').classList.toggle('selected', val==='dec');
        } else {
            document.getElementById('m-asset').classList.toggle('selected', val==='asset');
            document.getElementById('m-liab').classList.toggle('selected', val==='liab');
        }
    }

    function checkMatch() {
        const q = i18n[lang].matchQs[idx3];
        const val = parseFloat(document.getElementById('match-input').value);
        if(matchSel.dir === q.dir && matchSel.bs === q.bs && val === q.amt) {
            updateScore(30);
            document.getElementById('feedback').innerText = i18n[lang].correct;
            document.getElementById('check-match').disabled = true;
            document.getElementById('next-match').classList.remove('hidden');
        } else {
            document.getElementById('feedback').innerText = i18n[lang].wrong;
        }
    }

    function nextMatch() {
        idx3 = (idx3 + 1) % i18n[lang].matchQs.length;
        renderMatch();
    }

    function updateScore(pts) {
        score += pts;
        document.getElementById('score-label').innerText = i18n[lang].score + score;
    }

    function render() {
        renderClass();
        renderCalc();
        renderMatch();
        document.getElementById('score-label').innerText = i18n[lang].score + score;
    }

    render();
</script>

</body>
</html>
