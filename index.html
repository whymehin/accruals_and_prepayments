<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>Accounting Adventure · 應計與預付大冒險</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Comic+Neue:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4ecdc4;
            --secondary: #ffe66d;
            --accent: #ff6b6b;
            --dark: #292f36;
            --light: #f7fff7;
            --glass: rgba(255, 255, 255, 0.25);
            --border-radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: linear-gradient(135deg, #005c97 0%, #363795 100%);
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            color: var(--dark);
            padding: 10px 10px 50px 10px;
        }

        /* --- HEADER & NAV --- */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 10px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            color: #ffe66d;
            text-shadow: 2px 2px 0 #ff6b6b;
            margin-bottom: 8px;
        }

        .subtitle {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 15px;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .lang-switch {
            margin-top: 15px;
            background: white;
            border: 3px solid var(--accent);
            border-radius: 50px;
            display: flex;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .lang-opt { padding: 8px 15px; font-weight: bold; color: #aaa; font-size: 0.85rem; }
        .lang-opt.active { background: var(--accent); color: white; border-radius: 40px; }

        /* Tabs */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
            width: 100%;
        }

        .tab-btn {
            flex: 1;
            max-width: 120px;
            background: #fff;
            border: none;
            padding: 12px 5px;
            font-size: 0.9rem;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            border-bottom: 4px solid #ddd;
        }
        .tab-btn.active {
            background: var(--secondary);
            border-bottom-color: #e1c52f;
            transform: translateY(2px);
            box-shadow: none;
        }

        /* --- MAIN CONTAINER --- */
        .main-stage {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: var(--border-radius);
            padding: 20px 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            min-height: 500px;
        }

        .feedback-bar {
            margin-bottom: 20px;
            background: var(--dark);
            color: white;
            padding: 12px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            text-align: center;
        }

        .score-badge {
            background: var(--secondary);
            color: var(--dark);
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* --- GAME 1: CLASSIFICATION --- */
        .basket-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        .basket {
            background: #ffe082;
            border: 4px solid #ffca28;
            border-radius: 15px;
            min-height: 120px;
            padding: 15px;
            position: relative;
        }

        .basket-label {
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #ffca28;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 10px;
            display: inline-block;
        }

        .drop-zone {
            min-height: 60px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            align-items: center;
            border: 2px dashed rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .card-deck {
            background: #b3e5fc;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            overflow-x: auto; /* Allow horizontal scroll on mobile */
            gap: 12px;
            padding-bottom: 20px;
        }

        .scenario-card {
            min-width: 200px;
            background: white;
            padding: 12px;
            border-radius: 12px;
            border-left: 6px solid var(--accent);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-size: 0.95rem;
            cursor: grab;
        }

        /* --- GAME 2: CALCULATION --- */
        .calc-question-box {
            background: #fff9c4;
            padding: 20px;
            border-radius: 20px;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 20px;
            border: 3px solid #fbc02d;
        }

        .big-input {
            font-size: 1.5rem;
            padding: 12px;
            border-radius: 15px;
            border: 3px solid #4dd0e1;
            width: 100%;
            max-width: 200px;
            text-align: center;
            margin-bottom: 15px;
        }

        .action-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 15px;
            font-weight: bold;
            width: 100%;
            max-width: 250px;
            box-shadow: 0 5px 0 #c0392b;
        }

        .action-btn:disabled {
            background: #ccc;
            box-shadow: 0 5px 0 #999;
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* --- GAME 3: MATCH-UP --- */
        .matchup-grid { display: flex; flex-direction: column; gap: 20px; }
        
        .toggle-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .toggle-btn {
            flex: 1; padding: 10px 5px; border-radius: 12px;
            border: 2px solid #ddd; background: #fff;
            font-size: 0.85rem; font-weight: bold;
        }
        .toggle-btn.selected { background: #ffeb3b; border-color: #fbc02d; }

        .sticky-note {
            font-family: 'Comic Neue', cursive;
            background: #ffeb3b;
            padding: 8px;
            font-size: 0.9rem;
            border-radius: 4px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* Responsive Adjustments */
        @media (min-width: 768px) {
            h1 { font-size: 2.5rem; }
            header { flex-direction: row; justify-content: space-between; }
            .basket-container { flex-direction: row; }
            .matchup-grid { display: grid; grid-template-columns: 1fr 1fr; }
            .feedback-bar { flex-direction: row; justify-content: space-between; }
            .action-btn { width: auto; }
            .nav-tabs { gap: 15px; }
            .tab-btn { max-width: none; padding: 15px 30px; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <h1>💰 Accounting Adventure</h1>
        <div class="subtitle" id="subtitle">Grade 11 Accruals & Prepayments</div>
    </div>
    <div class="lang-switch" onclick="toggleLanguage()">
        <div class="lang-opt active" id="btn-zh">繁體中文</div>
        <div class="lang-opt" id="btn-en">English</div>
    </div>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('tab1')" id="nav-tab1">🧺 分類</button>
    <button class="tab-btn" onclick="switchTab('tab2')" id="nav-tab2">🧮 計算</button>
    <button class="tab-btn" onclick="switchTab('tab3')" id="nav-tab3">⚖️ 配對</button>
</div>

<div class="main-stage">
    <div class="feedback-bar">
        <span class="score-badge" id="score-display">🏆 分數: 0</span>
        <span id="feedback-msg">歡迎！請選擇一個模式。</span>
        <button onclick="resetGame()" style="background:#ff6b6b; color:white; border:none; padding:8px 12px; border-radius:10px; font-weight:bold;" id="btn-reset">🔄 重置</button>
    </div>
    
    <div id="tab1" class="game-mode">
        <div class="basket-container">
            <div class="basket">
                <div class="basket-label" id="label-accrual">🔴 應計 (欠款)</div>
                <div id="drop-accrual" class="drop-zone" ondrop="handleDrop(event, 'accrual')" ondragover="allowDrop(event)">
                    <span style="opacity: 0.3;">放入此處</span>
                </div>
            </div>
            <div class="basket">
                <div class="basket-label" id="label-prepayment">🟢 預付 (預繳)</div>
                <div id="drop-prepayment" class="drop-zone" ondrop="handleDrop(event, 'prepayment')" ondragover="allowDrop(event)">
                    <span style="opacity: 0.3;">放入此處</span>
                </div>
            </div>
        </div>
        <div class="card-deck" id="card-deck"></div>
    </div>

    <div id="tab2" class="game-mode hidden">
        <div class="calc-question-box" id="calc-question-text">Loading...</div>
        <div style="text-align: center;">
            <input type="number" id="calc-input" class="big-input" placeholder="$" inputmode="decimal">
            <br>
            <button class="action-btn" onclick="checkCalcAnswer()" id="btn-check-calc">✅ 檢查</button>
            <br>
            <button class="tab-btn" style="margin-top:15px; width:100%; max-width:250px;" onclick="nextCalcQuestion()" id="btn-next-calc">⏩ 下一題</button>
        </div>
    </div>

    <div id="tab3" class="game-mode hidden">
        <div class="matchup-grid">
            <div class="control-panel">
                <div class="calc-question-box" id="match-scenario-text" style="font-size: 1rem; padding:15px;">Loading...</div>
                
                <p style="font-size:0.8rem; font-weight:bold; margin-bottom:5px;" id="lbl-expense-impact">損益表影響</p>
                <div class="toggle-row">
                    <button class="toggle-btn" id="btn-inc" onclick="selectMatchOption('inc', 'dir')">➕ 增加費用</button>
                    <button class="toggle-btn" id="btn-dec" onclick="selectMatchOption('dec', 'dir')">➖ 減少費用</button>
                </div>

                <p style="font-size:0.8rem; font-weight:bold; margin-bottom:5px;" id="lbl-bs-impact">資產負債表位置</p>
                <div class="toggle-row">
                    <button class="toggle-btn" id="btn-liab" onclick="selectMatchOption('liab', 'bs')">🔴 流動負債</button>
                    <button class="toggle-btn" id="btn-asset" onclick="selectMatchOption('asset', 'bs')">🟢 流動資產</button>
                </div>

                <input type="number" id="match-amount" class="big-input" style="max-width:100%;" placeholder="金額 $" inputmode="decimal">
                <button class="action-btn" onclick="checkMatchAnswer()" id="btn-match-submit">確認</button>
                <button class="tab-btn" style="width:100%; margin-top:10px;" onclick="nextMatchScenario()" id="btn-match-next">⏩ 下一題</button>
            </div>

            <div class="visual-panel">
                <div style="background:#eee; padding:10px; border-radius:10px; margin-bottom:10px;">
                    <p style="font-size:0.7rem; font-weight:bold;" id="lbl-is">損益表 Preview</p>
                    <div id="sticker-is" class="sticky-note" style="display:inline-block; margin-top:5px;">?</div>
                </div>
                <div style="background:#eee; padding:10px; border-radius:10px;">
                    <p style="font-size:0.7rem; font-weight:bold;" id="lbl-bs">資產負債表 Preview</p>
                    <div style="display:flex; gap:10px; margin-top:5px;">
                        <div id="sticker-liab" class="sticky-note">? (負債)</div>
                        <div id="sticker-asset" class="sticky-note">? (資產)</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Logic & Translations (Condensed for brevity, focusing on the fix)
    const i18n = {
        zh: {
            labels: { score: "🏆 分數: ", welcome: "歡迎挑戰！", correct: "✅ 答對了！", wrong: "❌ 答錯了，再試試！", input: "⚠️ 請輸入數字", select: "⚠️ 請選擇方向及報表位置" },
            classCards: [
                { text: "收到12月電費單 $500，尚未付款", type: "accrual" },
                { text: "預繳明年首季租金 $9,000", type: "prepayment" },
                { text: "12月工資 $2,000，將於1月支付", type: "accrual" },
                { text: "支付保險費 $1,200，跨越明年", type: "prepayment" }
            ],
            calcQs: [
                { q: "已付租金 $12,000 (含預付 $2,000)。本年租金費用是多少？", a: 10000 },
                { q: "已付電費 $3,000，尚有應付電費 $500。本年費用是多少？", a: 3500 }
            ],
            matchQs: [
                { text: "期末有未付薪金 $1,500。", type: "accrual", dir: "inc", bs: "liab", amt: 1500 },
                { text: "保險費中有 $600 屬明年預付。", type: "prepayment", dir: "dec", bs: "asset", amt: 600 }
            ]
        },
        en: {
            labels: { score: "🏆 Score: ", welcome: "Welcome!", correct: "✅ Correct!", wrong: "❌ Wrong, try again!", input: "⚠️ Enter a number", select: "⚠️ Select options" },
            classCards: [
                { text: "Received Dec utility bill $500, unpaid", type: "accrual" },
                { text: "Paid rent $9,000 in advance for next year", type: "prepayment" },
                { text: "Dec wages $2,000, to be paid in Jan", type: "accrual" },
                { text: "Insurance $1,200 covers next year", type: "prepayment" }
            ],
            calcQs: [
                { q: "Rent paid $12,000 (includes $2,000 prepaid). What is the expense?", a: 10000 },
                { q: "Electricity paid $3,000. Accrued $500. What is total expense?", a: 3500 }
            ],
            matchQs: [
                { text: "Accrued wages at year end: $1,500.", type: "accrual", dir: "inc", bs: "liab", amt: 1500 },
                { text: "Insurance includes $600 prepaid.", type: "prepayment", dir: "dec", bs: "asset", amt: 600 }
            ]
        }
    };

    let currentLang = 'zh';
    let score = 0;
    let calcIndex = 0;
    let matchIndex = 0;
    let matchSelection = { dir: null, bs: null };
    let draggedData = null;

    function switchTab(tabId) {
        document.querySelectorAll('.game-mode').forEach(d => d.classList.add('hidden'));
        document.getElementById(tabId).classList.remove('hidden');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function toggleLanguage() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        document.getElementById('btn-zh').classList.toggle('active');
        document.getElementById('btn-en').classList.toggle('active');
        renderAll();
    }

    function renderAll() {
        renderTab1();
        renderTab2();
        renderTab3();
        updateScore(0);
    }

    // --- GAME 1 Logic ---
    function renderTab1() {
        const deck = document.getElementById('card-deck');
        deck.innerHTML = '';
        i18n[currentLang].classCards.forEach(card => {
            const div = document.createElement('div');
            div.className = 'scenario-card';
            div.draggable = true;
            div.innerText = card.text;
            div.dataset.type = card.type;
            div.addEventListener('dragstart', (e) => draggedData = div);
            deck.appendChild(div);
        });
    }
    function allowDrop(e) { e.preventDefault(); }
    function handleDrop(e, type) {
        if(!draggedData) return;
        if(draggedData.dataset.type === type) {
            updateScore(10);
            draggedData.remove();
            document.getElementById('feedback-msg').innerText = i18n[currentLang].labels.correct;
        } else {
            document.getElementById('feedback-msg').innerText = i18n[currentLang].labels.wrong;
        }
    }

    // --- GAME 2 Logic (With Disable Fix) ---
    function renderTab2() {
        document.getElementById('calc-question-text').innerText = i18n[currentLang].calcQs[calcIndex].q;
        document.getElementById('calc-input').value = '';
        document.getElementById('btn-check-calc').disabled = false; // Enable for new question
    }

    function checkCalcAnswer() {
        const val = parseFloat(document.getElementById('calc-input').value);
        const correct = i18n[currentLang].calcQs[calcIndex].a;
        if(isNaN(val)) return alert(i18n[currentLang].labels.input);

        if(val === correct) {
            updateScore(20);
            document.getElementById('feedback-msg').innerText = i18n[currentLang].labels.correct;
            document.getElementById('btn-check-calc').disabled = true; // DISABLE ON CORRECT
        } else {
            document.getElementById('feedback-msg').innerText = i18n[currentLang].labels.wrong;
        }
    }

    function nextCalcQuestion() {
        calcIndex = (calcIndex + 1) % i18n[currentLang].calcQs.length;
        renderTab2();
    }

    // --- GAME 3 Logic (With Disable Fix) ---
    function renderTab3() {
        document.getElementById('match-scenario-text').innerText = i18n[currentLang].matchQs[matchIndex].text;
        document.getElementById('match-amount').value = '';
        matchSelection = { dir: null, bs: null };
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('btn-match-submit').disabled = false; // Enable for new question
    }

    function selectMatchOption(val, cat) {
        matchSelection[cat] = val;
        if(cat === 'dir') {
            document.getElementById('btn-inc').classList.toggle('selected', val==='inc');
            document.getElementById('btn-dec').classList.toggle('selected', val==='dec');
        } else {
            document.getElementById('btn-liab').classList.toggle('selected', val==='liab');
            document.getElementById('btn-asset').classList.toggle('selected', val==='asset');
        }
    }

    function checkMatchAnswer() {
        const data = i18n[currentLang].matchQs[matchIndex];
        const val = parseFloat(document.getElementById('match-amount').value);
        if(!matchSelection.dir || !matchSelection.bs || isNaN(val)) return alert(i18n[currentLang].labels.select);

        if(matchSelection.dir === data.dir && matchSelection.bs === data.bs && val === data.amt) {
            updateScore(30);
            document.getElementById('feedback-msg').innerText = i18n[currentLang].labels.correct;
            document.getElementById('btn-match-submit').disabled = true; // DISABLE ON CORRECT
        } else {
            document.getElementById('feedback-msg').innerText = i18n[currentLang].labels.wrong;
        }
    }

    function nextMatchScenario() {
        matchIndex = (matchIndex + 1) % i18n[currentLang].matchQs.length;
        renderTab3();
    }

    function updateScore(p) { score += p; document.getElementById('score-display').innerText = i18n[currentLang].labels.score + score; }
    function resetGame() { score = 0; calcIndex = 0; matchIndex = 0; renderAll(); }

    renderAll();
</script>
</body>
</html>
